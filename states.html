<script>
    // 加载 header
    fetch('./header.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('header').innerHTML = data;

            $(".icon-nav").click(function() {
                $(".nav-cover").toggleClass('expand');
                $(".header-nav").toggleClass('expand');
            })
            $(".nav-cover").click(function() {
                $(".nav-cover").toggleClass('expand');
                $(".header-nav").toggleClass('expand');
            })

            $(".nav-item.expand .nav-con").on('click', function(e) {
                if ($(e.target).closest('.icon-go').length) {
                    e.preventDefault();
                    $(this).parent().find(".nav-sub-list").toggleClass("expand");
                }
            });
        });

    // 加载 footer
    fetch('./footer.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('footer').innerHTML = data;
        });
</script>

<script type="module">
    import {
        fetchAllCategoriesWithCount,
        fetchAllStates
    } from './js/supabaseApi.js';

    /* =========================
       CATEGORY META
    ========================= */
    const CATEGORY_META = {
        SUVs: { slug: "suvs", icon: "icon-suvs" },
        Trucks: { slug: "trucks", icon: "icon-trucks" },
        Sedans: { slug: "sedans", icon: "icon-sedans" },
        Hybrids: { slug: "hybrids", icon: "icon-hybrids" },
        Vans: { slug: "vans", icon: "icon-vans" },
        Coupes: { slug: "coupes", icon: "icon-coupes" },
        Hatchbacks: { slug: "hatchbacks", icon: "icon-hatchbacks" },
        Convertibles: { slug: "convertibles", icon: "icon-convertibles" },
        Motorcycles: { slug: "motorcycles", icon: "icon-motorcycles" },
        "Classic Cars": { slug: "classic-cars", icon: "icon-classic-cars" },
        "RVs & Campers": { slug: "rvs-and-campers", icon: "icon-rvs-and-campers" },
        Motorhomes: { slug: "motorhomes", icon: "icon-motorhomes" },
        "Station Wagons": { slug: "station-wagons", icon: "icon-station-wagons" },
        Trailers: { slug: "trailers", icon: "icon-trailers" }
    };

    /* =========================
       STATE ABBR
    ========================= */
    const STATE_ABBR = {
        Alabama: "al",
        Alaska: "ak",
        Arizona: "az",
        Arkansas: "ar",
        California: "ca",
        Colorado: "co",
        Connecticut: "ct",
        Delaware: "de",
        "District of Columbia": "dc",
        Florida: "fl",
        Georgia: "ga",
        Hawaii: "hi",
        Idaho: "id",
        Illinois: "il",
        Indiana: "in",
        Iowa: "ia",
        Kansas: "ks",
        Kentucky: "ky",
        Louisiana: "la",
        Maine: "me",
        Maryland: "md",
        Massachusetts: "ma",
        Michigan: "mi",
        Minnesota: "mn",
        Mississippi: "ms",
        Missouri: "mo",
        Montana: "mt",
        Nebraska: "ne",
        Nevada: "nv",
        "New Hampshire": "nh",
        "New Jersey": "nj",
        "New Mexico": "nm",
        "New York": "ny",
        "North Carolina": "nc",
        "North Dakota": "nd",
        Ohio: "oh",
        Oklahoma: "ok",
        Oregon: "or",
        Pennsylvania: "pa",
        "Rhode Island": "ri",
        "South Carolina": "sc",
        "South Dakota": "sd",
        Tennessee: "tn",
        Texas: "tx",
        Utah: "ut",
        Vermont: "vt",
        Virginia: "va",
        Washington: "wa",
        "West Virginia": "wv",
        Wisconsin: "wi",
        Wyoming: "wy"
    };

    /* =========================
       HELPERS
    ========================= */
    function formatNumber(num) {
        return Number(num).toLocaleString("en-US");
    }

    /* =========================
       RENDER CATEGORY TYPES
    ========================= */
    async function renderCategoryTypes() {
        const { data: categories, error } = await fetchAllCategoriesWithCount();

        if (error) {
            console.error("Category fetch error:", error);
            return;
        }

        const ul = document.querySelector(".aside-type-list.number");
        if (!ul) return;

        ul.innerHTML = "";

        const params = new URLSearchParams(window.location.search);

        const make = params.get("make");
        const state = params.get("state");
        const category = params.get("category");



        categories.forEach(({ category, count }) => {

            const meta = CATEGORY_META[category];
            if (!meta) return;

            const li = document.createElement("li");
            li.className = "aside-type-item";

            let next_url = ``

            if(!state){
                next_url = `/used-cars/state?category=${encodeURIComponent(category)}`
            }

            li.innerHTML = `
            <a href="${next_url}" class="link-cover"></a>

            <svg class="aside-type-icon">
                <use xlink:href="#${meta.icon}"></use>
            </svg>

            <span>
                <a href="/used-cars/${meta.slug}/"
                   class="aside-type-name">
                   ${category} for Sale
                </a>

                <span class="aside-type-count general-num">
                    ${formatNumber(count)}
                </span>
            </span>
        `;

            ul.appendChild(li);
        });
    }

    /* =========================
       RENDER STATE LIST
    ========================= */
    async function renderStateList() {

        const { data: states, error } = await fetchAllStates();

        if (error) {
            console.error("State fetch error:", error);
            return;
        }

        const ul = document.querySelector(".general-list.state-list");
        if (!ul) return;

        ul.innerHTML = "";

        const params = new URLSearchParams(window.location.search);

        const make = params.get("make");
        const state = params.get("state");
        const category = params.get("category");

        states.forEach(({ state }) => {

            const abbr = STATE_ABBR[state];
            if (!abbr) return;

            const li = document.createElement("li");
            li.className = "general-item";

            let next_url = ``
            if(!make && category){
                next_url = `/used-cars/${category}/${state}/list`
            }

            if(make && !category){
                next_url = `/car-makes/${make}/${state}/list`
            }

            if(!make && !category){
                // 获取当前路径
                const path = window.location.pathname;
                if (path.includes('/car-makes/')) {
                    console.log('car-makes Page');
                    next_url = `/car-makes/${state}/maker`
                } else if (path.includes('/used-cars/')) {
                    console.log('used-cars Page');
                    next_url = `/used-cars/${state}/types`
                }
            }

            li.innerHTML = `
            <a href="${next_url}"
               class="general-link">

               <span class="general-name">
                   ${state}
               </span>

            </a>
        `;

            ul.appendChild(li);
        });
    }

    function capitalizeFirstLetter(str) {
        if (!str) return str;
        return str.charAt(0).toUpperCase() + str.slice(1);
    }

    document.querySelectorAll('a.link-cover, a.brand-name').forEach(el => {
        // 从 brand-name 获取 make，或者从 href 提取
        let make = el.textContent.trim();

        // 如果 link-cover 没有文本，从 href 提取
        if (!make) {
            const match = el.getAttribute('href').match(/\/car-makes\/([^\/]+)\//);
            if (match) {
                make = match[1];
            }
        }

        if (make) {
            el.href = `/car-makes/state?make=${capitalizeFirstLetter(encodeURIComponent(make))}`;
        }
    });

    /* =========================
       INIT
    ========================= */
    document.addEventListener("DOMContentLoaded", () => {
        renderCategoryTypes();
        renderStateList();
        document.getElementById("mainBody").style.display = "block"
    });
</script>
